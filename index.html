.toggle-container {
  position: relative;
  top: 10px; /* فاصله از بالا */
  left: 30%; /* وسط صفحه */
  transform: translateX(-50%); /* دقیقاً وسط */
  width: 60px;
  height: 30px;
  background: #eee;
  border-radius: 30px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  transition: background 0.5s;
  z-index: 1002; /* از منو جلوتر باشه */
}
}

.toggle-circle {
  width: 26px;
  height: 26px;
  background: rgb(224,207,97);
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: 0.5s;
  /* دایره‌ی داخل سوئیچ دارک مود */
}

.toggle-container.active {
  background: rgb(0,39,129); /* رنگ پس‌زمینه در حالت فعال */
}

.toggle-container.active .toggle-circle {
  transform: translateX(30px); /* حرکت دایره به سمت راست */
  background: #fff; /* تغییر رنگ دایره */
}

  #menu-check {
    display: none;
  }
  #menu-check:checked ~ nav {
    width: 50%;
  }
  #menu-check:checked ~ nav ul {
    opacity: 1;
  }
  #menu-check:checked ~ #menuToggle span:nth-child(1) {
    transform: rotate(45deg) translate(7px, 7px);
  }
  #menu-check:checked ~ #menuToggle span:nth-child(2) {
    opacity: 0;
  }
  #menu-check:checked ~ #menuToggle span:nth-child(3) {
    transform: rotate(-45deg) translate(7px, -7px);
  }

const startTime = Date.now();

    loader.classList.add("fade-out");
    setTimeout(() => {

      main.style.display = "block";

// بستن منوی همبرگری هنگام کلیک خارج از آن
document.addEventListener("click", function (e) {
  const menuToggle = document.getElementById("menuToggle");
  const menuCheck = document.getElementById("menu-check");
  if (menuCheck.checked && !menuToggle.contains(e.target) && !menuCheck.contains(e.target)) {
    menuCheck.checked = false;
  }
});

// نمایش فرم ثبت‌نام و اسکرول به آن
document.getElementById("triggerButton").addEventListener("click", () => {
  const form = document.getElementById("contentContainer");
  form.classList.add("show");
  const offset = form.getBoundingClientRect().top + window.scrollY - 300;
  window.scrollTo({ top: offset, behavior: "smooth" });
});

// مدیریت حالت تیره/روشن با ذخیره‌سازی در localStorage
const themeToggle = document.getElementById("themeToggle");
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark-mode");
}
themeToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark-mode");
  localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
});

// تغییر ظاهر عنوان، لوگو و رنگ هدر هنگام اسکرول
window.addEventListener("scroll", () => {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const percent = (scrollTop / docHeight) * 100;

  const title = document.getElementById("siteTitle");
  const logo = document.getElementById("header-logo");
  const header = document.querySelector(".main-header");

  title.style.opacity = percent < 55 ? 0 : 1;
  logo.style.opacity = percent < 45 ? 0 : 1;
  header.style.backgroundColor = percent < 50 ? "transparent" : "var(--bg-header)";
  


});







// تنظیم دستی وضعیت
const riskStatus = 'off'; // on یا off

const riskTitle = document.getElementById('risk-title');
const riskDesc = document.getElementById('risk-desc');
const riskMeter = document.getElementById('risk-meter');

if (riskStatus === 'on') {
  riskTitle.textContent = 'Risk On';
  riskDesc.textContent = 'Markets are optimistic. Risk assets are in demand.';
  riskMeter.classList.add('risk-on');
  riskMeter.classList.remove('risk-off');
} else {
  riskTitle.textContent = 'Risk Off';
  riskDesc.textContent = 'Markets are fearful. Safe-haven assets preferred.';
  riskMeter.classList.add('risk-off');
  riskMeter.classList.remove('risk-on');
}

// اجرای تغییر زبان
function updateLanguage(lang) {
  const t = translations[lang];
  document.getElementById("siteTitle").textContent = t.siteTitle;
  document.getElementById("triggerButton").textContent = t.triggerButton;
  document.getElementById("home").textContent = t.home;
  document.getElementById("fxmarketHours").textContent = t.fxmarketHours;
  document.getElementById("education").textContent = t.education;
  document.getElementById("calendar").textContent = t.calendar;
  document.getElementById("contact").textContent = t.contact;
  document.getElementById("forUs").textContent = t.forUs;
  document.getElementById("login").textContent = t.login;
  document.getElementById("email").textContent = t.email;
  document.getElementById("password").textContent = t.password;
  document.getElementById("forgotPassword").textContent = t.forgotPassword;
  document.getElementById("footerText").textContent = t.footerText;

  document.body.dir = lang === 'fa' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  localStorage.setItem("lang", lang);
}

// مقدار اولیه از localStorage
const languageSelect = document.getElementById("languageSelect");
const savedLang = localStorage.getItem("lang") || "fa";
languageSelect.value = savedLang;
updateLanguage(savedLang);

// تغییر زبان با سلکت
languageSelect.addEventListener("change", () => {
  updateLanguage(languageSelect.value);
});
