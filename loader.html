<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loader</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000}
    .container{position:relative;width:100%;height:200px;display:flex;align-items:center;justify-content:center;-webkit-box-reflect:below 0 linear-gradient(transparent,transparent,#0005)}
    .loader{position:absolute;width:200px;height:200px;border-radius:50%;animation:spin 2s linear infinite}
    @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    .loader:nth-child(1)::before,.loader:nth-child(2)::before{content:'';position:absolute;top:0;left:0;width:50%;height:100%;background:linear-gradient(to top,transparent,#ffc94b);background-size:100px 180px;background-repeat:no-repeat;border-top-left-radius:100px;border-bottom-left-radius:100px}
    .loader i{position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:20px;background:#ff600c;border-radius:50%;z-index:100;box-shadow:0 0 10px #ff600c,0 0 20px #ff600c,0 0 30px #ff600c,0 0 40px #ff600c,0 0 50px #ff600c,0 0 60px #ff600c,0 0 70px #ff600c,0 0 80px #ff600c,0 0 90px #ff600c,0 0 100px #ff600c}
    .loader span{position:absolute;inset:20px;background:#000;border-radius:50%;z-index:1}
  </style>
</head>
<body>
  <div class="container">
    <div class="loader"><span></span></div>
    <div class="loader"><span></span></div>
    <div class="loader"><i></i></div>
    <div class="loader"><i></i></div>
  </div>
</body>
</html>
